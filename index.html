<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIPPY FRISBEE - BENDING BRANCHES</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { margin: 0; overflow: hidden; background: #081a05; font-family: 'VT323', monospace; color: white; image-rendering: pixelated; }
        canvas { display: block; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); z-index: 20; text-align: center; }
        #overlay h1 { font-size: 85px; text-shadow: 5px 5px #d34; margin: 0; letter-spacing: 2px; line-height: 0.8; }
        .mushroom { width: 60px; height: 50px; margin-bottom: 20px; position: relative; display: inline-block; animation: bounce 2s infinite ease-in-out; }
        .m-top { width: 60px; height: 30px; background: #d34; border-radius: 30px 30px 5px 5px; box-shadow: inset -10px -5px rgba(0,0,0,0.2); }
        .m-dot { position: absolute; background: white; width: 10px; height: 10px; border-radius: 50%; }
        .m-stem { width: 25px; height: 20px; background: #eee; margin: -2px auto 0; border-radius: 0 0 5px 5px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .btn { padding: 10px 45px; background: #d34; color: white; border: 4px solid white; cursor: pointer; margin-top: 30px; font-size: 26px; font-family: 'VT323', monospace; box-shadow: 5px 5px #000; transition: 0.2s; }
        .btn:hover { background: #ff5555; transform: scale(1.05); }
        .char-container { display: flex; gap: 40px; margin: 30px 0; }
        .char-card { border: 4px solid #555; padding: 10px; cursor: pointer; background: rgba(0,0,0,0.5); width: 160px; transition: 0.3s; }
        .char-card img { width: 100%; height: 180px; object-fit: cover; border: 2px solid #333; margin-bottom: 10px; }
        .char-card.selected { border-color: #fff; background: rgba(255,255,255,0.1); box-shadow: 0 0 25px #fff; transform: translateY(-10px); }
        #ui-ingame { position: absolute; top: 20px; left: 20px; pointer-events: none; text-shadow: 3px 3px #000; z-index: 10; display: none; font-size: 30px; }
      /* Box Comandi Fisso in alto a destra */
#controls-ui { 
    position: absolute; 
    top: 20px; 
    right: 20px; 
    text-align: right; 
    pointer-events: none; 
    text-shadow: 2px 2px #000; 
    z-index: 10; 
    display: none; /* Nascondo inizialmente */
    font-size: 20px; 
    color: #aaa; 
}
#controls-ui b { color: #fff; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        
        /* Stile per i sottotitoli dei personaggi */
        #trippy-subs {
            position: absolute;
            bottom: 15%;
            width: 100%;
            text-align: center;
            font-size: 42px;
            color: #fff;
            text-shadow: 4px 4px #000;
            z-index: 30;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="screen-title">
            <div class="mushroom"><div class="m-top"><div class="m-dot" style="top:5px; left:15px;"></div><div class="m-dot" style="top:12px; left:40px; width:6px; height:6px;"></div></div><div class="m-stem"></div></div>
            <h1>TRIPPY FRISBEE</h1>
            <p style="color: #666; margin-top: 10px; letter-spacing: 4px;">ARCADE MODE (VS CPU)</p>
            <button class="btn" onclick="goToSelect()">INSERT COIN</button>
        </div>
        <div id="screen-select" style="display:none;">
            <h2>SELECT YOUR HERO</h2>
            <div class="char-container">
                <div class="char-card" id="card-ale" onclick="selectChar('Alessandro')"><img src="ale.jpeg" alt="Ale"><h3>ALESSANDRO</h3></div>
                <div class="char-card" id="card-gug" onclick="selectChar('Guglielmo')"><img src="gug.jpeg" alt="Gug"><h3>GUGLIELMO</h3></div>
            </div>
            <button class="btn" id="startBtn" style="opacity:0.3; pointer-events:none;">START GAME</button>
        </div>
    </div>

    <div id="ui-ingame">
      
        <div id="score-txt">SCORE: 000</div>
        <div id="poison-txt" style="color: lime;">STATUS: SOBER</div>
    </div>
  
<div id="controls-ui">
    <b>ARROWS:</b> MOVE<br>
    <b>SPACE:</b> THROW
</div>
    <div id="trippy-subs"></div>

    <canvas id="gameCanvas"></canvas>

<script>
// Caricamento Immagini Personaggi Trippy
const imgNick = new Image(); imgNick.src = 'Nick.png';
const imgPat = new Image(); imgPat.src = 'Pat.png';

const sounds = {
    soundtrack: new Audio('sountrack.mp3'),
    frisbee: [new Audio('fx_frisbee1.mp3'), new Audio('fx_frisbee2.mp3'), new Audio('fx_frisbee3.mp3')],
    merda: [new Audio('fx_merda1.mp3'), new Audio('fx_merda2.mp3'), new Audio('fx_merda3.mp3')],
    point: new Audio('fx_point.mp3'),
    schianto: new Audio('fx_schianto.mp3')
};
sounds.soundtrack.loop = true;
let currentMerdaIdx = 0, currentFrisbeeIdx = 0;

function unlockAudio() { Object.values(sounds).forEach(s => { if (Array.isArray(s)) s.forEach(t => { t.play().catch(()=>{}); t.pause(); }); else { s.play().catch(()=>{}); s.pause(); } }); }
function playSound(key) {
    try {
        if (key === 'soundtrack') sounds.soundtrack.play().catch(() => {});
        else if (key === 'frisbee') { sounds.frisbee[currentFrisbeeIdx].currentTime = 0; sounds.frisbee[currentFrisbeeIdx].play(); currentFrisbeeIdx = (currentFrisbeeIdx + 1) % 3; }
        else if (key === 'point') { sounds.soundtrack.pause(); sounds.point.play(); setTimeout(() => { if(gameState === 'PLAYING') sounds.soundtrack.play(); }, 1500); }
        else if (key === 'merda') { sounds.soundtrack.pause(); sounds.merda[currentMerdaIdx].play(); currentMerdaIdx = (currentMerdaIdx + 1) % 3; setTimeout(() => { if(gameState === 'PLAYING') sounds.soundtrack.play(); }, 1800); }
        else if (key === 'schianto') { sounds.soundtrack.pause(); sounds.schianto.play(); }
    } catch(e) {}
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let score = 0, gameState = 'MENU', poisonedLevel = 0, keys = {}, selectedPlayerName = null;
let userRole = 'bottom', frameCount = 0;

const tree = { x: 0, y: 0, trunkW: 65, trunkH: 100, opening: 160, branchWidth: 300, branchLength: 180, offsetX: 0, drift: 0 };
const players = { top: { x: 0, y: 80, speed: 7, skinColor: '#ffd393' }, bottom: { x: 0, y: 0, speed: 7, skinColor: '#ffd393', beardColor: '#d34' } };
const frisbee = { x: 0, y: 0, r: 9, vy: 0, active: false, owner: 'bottom', trail: [], passedThroughBranches: false };
const musicNpc = { x: 0, y: 0, anim: 0 };
const spiders = [];  
const musicalNotes = [];

// Logica Apparizioni Trippy
let activeHallucination = null; // { type: 'Nick'|'Pat', timer: 180, side: 'left'|'right' }
let hallucinationCooldown = 0;

function goToSelect() { unlockAudio(); playSound('soundtrack'); document.getElementById('screen-title').style.display = 'none'; document.getElementById('screen-select').style.display = 'block'; }
function selectChar(name) {
    selectedPlayerName = name; userRole = (name === 'Alessandro') ? 'bottom' : 'top';
    document.getElementById('card-ale').classList.toggle('selected', name === 'Alessandro');
    document.getElementById('card-gug').classList.toggle('selected', name === 'Guglielmo');
    document.getElementById('startBtn').style.opacity = "1"; document.getElementById('startBtn').style.pointerEvents = "auto";
}

document.getElementById('startBtn').addEventListener('click', () => {
    gameState = 'PLAYING'; document.getElementById('overlay').style.display = 'none'; document.getElementById('ui-ingame').style.display = 'block';
  document.getElementById('controls-ui').style.display = 'block';
    setupPositions();
});

function setupPositions() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    players.top.x = canvas.width / 2; players.top.y = 80;
    players.bottom.x = canvas.width / 2; players.bottom.y = canvas.height - 110;
    tree.x = canvas.width / 2; tree.y = canvas.height / 2;
    musicNpc.x = canvas.width - 80; musicNpc.y = canvas.height / 2;
    if (!frisbee.active) resetFrisbee();
}

function resetFrisbee() {
    frisbee.active = false; frisbee.vy = 0; frisbee.trail = [];
    frisbee.x = frisbee.owner === 'bottom' ? players.bottom.x : players.top.x;
    frisbee.y = frisbee.owner === 'bottom' ? players.bottom.y - 45 : players.top.y + 45;
}

window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

function launch(p) {
    if (!frisbee.active && frisbee.owner === p) {
        frisbee.active = true; frisbee.passedThroughBranches = false;
        frisbee.vy = (p === 'bottom') ? -13 : 13; playSound('frisbee');
    }
}

function update() {
    if (gameState !== 'PLAYING') return;
    frameCount++; 
    musicNpc.anim = Math.sin(frameCount * 0.15) * 5;
    
    poisonedLevel = Math.floor(score / 3);
    let trippingPercentage = poisonedLevel * 15;
    let pTxt = document.getElementById('poison-txt');
    
    if (score >= 3) {
        pTxt.innerText = "STATUS: TRIPPING (" + trippingPercentage + "%)"; 
        pTxt.style.color = "#f0f"; pTxt.classList.add('blink');
        tree.drift += 0.005 + (poisonedLevel * 0.002); 
        tree.offsetX = Math.sin(tree.drift) * (250 + score * 5);
    } else {
        pTxt.innerText = "STATUS: SOBER"; 
        pTxt.style.color = "lime"; pTxt.classList.remove('blink');
        tree.offsetX = 0;
    }

    // GESTIONE APPARIZIONI PERSONAGGI (HALLUCINATIONS)
    if (hallucinationCooldown > 0) hallucinationCooldown--;
    const subDiv = document.getElementById('trippy-subs');

    if (!activeHallucination && hallucinationCooldown <= 0) {
        if (trippingPercentage >= 90) {
            activeHallucination = { type: 'Pat', timer: 180, side: 'right', text: "let's fucskiijdj dgk adnckawsd powrs afucking beer" };
            subDiv.innerText = activeHallucination.text; subDiv.style.display = 'block';
        } else if (trippingPercentage >= 60) {
            activeHallucination = { type: 'Nick', timer: 180, side: 'left', text: "...it's gonna get better guys" };
            subDiv.innerText = activeHallucination.text; subDiv.style.display = 'block';
        }
    }

    if (activeHallucination) {
        activeHallucination.timer--;
        if (activeHallucination.timer <= 0) {
            activeHallucination = null;
            subDiv.style.display = 'none';
            hallucinationCooldown = 300; // 5 secondi di pausa tra allucinazioni
        }
    }

    // Movimento Player
    let user = players[userRole];
    if (keys['ArrowLeft'] && user.x > 30) user.x -= user.speed;
    if (keys['ArrowRight'] && user.x < canvas.width - 30) user.x += user.speed;
    if (userRole === 'bottom') {
        if (keys['ArrowUp'] && user.y > tree.y + 110) user.y -= user.speed;
        if (keys['ArrowDown'] && user.y < canvas.height - 40) user.y += user.speed;
    } else {
        if (keys['ArrowUp'] && user.y > 40) user.y -= user.speed;
        if (keys['ArrowDown'] && user.y < tree.y - 110) user.y += user.speed;
    }
    if (keys['Space']) launch(userRole);

    // Note Musicali
    if (frameCount % 20 === 0) {
        musicalNotes.push({ x: musicNpc.x - 20, y: musicNpc.y + 20, vx: -0.5 - Math.random(), vy: -1 - Math.random(), opacity: 1, char: ['♪', '♫', '♬'][Math.floor(Math.random() * 3)] });
    }
    musicalNotes.forEach((note, i) => { note.x += note.vx; note.y += note.vy; note.opacity -= 0.01; if (note.opacity <= 0) musicalNotes.splice(i, 1); });

    // Ragnetti
    let maxSpiders = Math.floor(trippingPercentage / 10);
    if (trippingPercentage >= 45) {
        if (spiders.length < maxSpiders && Math.random() > 0.98) {
            spiders.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3, legAnim: 0, timer: Math.random() * 100 });
        }
    }
    spiders.forEach((spider, index) => {
        spider.timer--;
        if (spider.timer <= 0) { spider.vx = (Math.random() - 0.5) * 4; spider.vy = (Math.random() - 0.5) * 4; spider.timer = 50 + Math.random() * 100; }
        spider.x += spider.vx; spider.y += spider.vy; spider.legAnim += 0.2;
        if (spider.x < 0 || spider.x > canvas.width) spider.vx *= -1;
        if (spider.y < 0 || spider.y > canvas.height) spider.vy *= -1;
        if (spiders.length > maxSpiders) spiders.splice(index, 1);
    });

    // CPU Logic
    let cpuRole = (userRole === 'bottom') ? 'top' : 'bottom';
    let cpu = players[cpuRole];
    let targetX = frisbee.active ? frisbee.x : user.x;
    let cpuSpeed = 5 + (score * 0.2); 
    if (cpu.x < targetX - 5) cpu.x += cpuSpeed; else if (cpu.x > targetX + 5) cpu.x -= cpuSpeed;
    let targetY = (cpuRole === 'top') ? tree.y - Math.abs(user.y - tree.y) : tree.y + Math.abs(user.y - tree.y);
    if (cpuRole === 'top') targetY = Math.max(40, Math.min(tree.y - 110, targetY));
    else targetY = Math.max(tree.y + 110, Math.min(canvas.height - 40, targetY));
    if (cpu.y < targetY - 5) cpu.y += cpuSpeed * 0.5; else if (cpu.y > targetY + 5) cpu.y -= cpuSpeed * 0.5;

    // Collisioni Rami e Penalità
    if (frisbee.active) {
        const relX = frisbee.x - (tree.x + tree.offsetX);
        if (frisbee.y < tree.y + 20 && frisbee.y > tree.y - tree.branchLength) {
            if (Math.abs(relX) > tree.opening / 2 - 5 && Math.abs(relX) < tree.branchWidth / 2 + 10) {
                playSound('schianto'); playSound('merda');
                let penalty = Math.max(1, Math.floor(score * 0.10));
                score = Math.max(0, score - penalty);
                frisbee.active = false; frisbee.trail = [];
                setTimeout(resetFrisbee, 600); return; 
            } else if (Math.abs(relX) <= tree.opening / 2 - 5) { frisbee.passedThroughBranches = true; }
        }
    }

    if (!frisbee.active && frisbee.owner === cpuRole) setTimeout(() => launch(cpuRole), 600);

    if (frisbee.active) {
        frisbee.y += frisbee.vy; frisbee.trail.push({x: frisbee.x, y: frisbee.y});
        if (frisbee.trail.length > 12) frisbee.trail.shift();
        let dTop = Math.hypot(frisbee.x - players.top.x, frisbee.y - players.top.y);
        let dBot = Math.hypot(frisbee.x - players.bottom.x, frisbee.y - players.bottom.y);
        if (frisbee.vy < 0 && dTop < 42) { if (frisbee.passedThroughBranches) { score++; playSound('point'); } frisbee.owner = 'top'; resetFrisbee(); }
        else if (frisbee.vy > 0 && dBot < 42) { if (frisbee.passedThroughBranches) { score++; playSound('point'); } frisbee.owner = 'bottom'; resetFrisbee(); }
        if (frisbee.y < -50 || frisbee.y > canvas.height + 50) { playSound('merda'); resetFrisbee(); }
    } else {
        frisbee.x = frisbee.owner === 'bottom' ? players.bottom.x : players.top.x;
        frisbee.y = frisbee.owner === 'bottom' ? players.bottom.y - 40 : players.top.y + 40;
    }
    document.getElementById('score-txt').innerText = "SCORE: " + score.toString().padStart(3, '0');
}

function draw() {
    if (poisonedLevel > 0 && Math.random() > 0.98 - (poisonedLevel * 0.01)) {
        ctx.fillStyle = `rgba(255, 255, 255, ${0.1 * poisonedLevel})`; ctx.fillRect(0, 0, canvas.width, canvas.height);
    } else { ctx.fillStyle = '#1e3d1a'; ctx.fillRect(0, 0, canvas.width, canvas.height); }

    if (gameState === 'PLAYING') {
        ctx.save();
        if (poisonedLevel > 0 && Math.random() > 0.93) {
            ctx.translate((Math.random()-0.5) * poisonedLevel * 20, (Math.random()-0.5) * poisonedLevel * 5);
            ctx.filter = `hue-rotate(${poisonedLevel * 30}deg) brightness(1.2)`;
        }

        // Cespugli
        for(let i = 0; i < 6; i++) {
            let cx = (canvas.width / 7) * (i + 1); let cy = (i % 2 === 0) ? 150 : canvas.height - 150;
            ctx.fillStyle = (poisonedLevel > 0) ? `hsl(${(frameCount + i*60) % 360}, 40%, 30%)` : '#142b11';
            ctx.beginPath(); ctx.arc(cx, cy, 20, 0, Math.PI*2); ctx.arc(cx - 15, cy + 10, 15, 0, Math.PI*2); ctx.arc(cx + 15, cy + 10, 15, 0, Math.PI*2); ctx.fill();
        }

        // Albero
        ctx.save(); ctx.translate(tree.x + tree.offsetX, tree.y);
        ctx.fillStyle = '#3d2514'; ctx.fillRect(-tree.trunkW/2, -5, tree.trunkW, tree.trunkH);
        [-1, 1].forEach(side => {
            ctx.beginPath(); ctx.moveTo(side * (tree.trunkW/2 - 5), 10);
            ctx.lineTo(side * (tree.branchWidth * 0.5), -tree.branchLength * 0.4); ctx.lineTo(side * (tree.opening * 0.5), -tree.branchLength);
            ctx.lineTo(side * (tree.opening * 0.6 - 15), -tree.branchLength); ctx.lineTo(side * (tree.branchWidth * 0.6 - 10), -tree.branchLength * 0.4 + 10);
            ctx.lineTo(side * 5, 30); ctx.closePath(); ctx.fill();
            ctx.fillRect(side * (tree.branchWidth * 0.5), -tree.branchLength * 0.2, side * 30, 6);
        });
        ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-15, 20, 4, 35); ctx.fillRect(10, 45, 3, 20); ctx.fillRect(-25, 60, 3, 15);
        ctx.restore();

        // Music NPC
        ctx.save(); ctx.translate(musicNpc.x, musicNpc.y);
        musicalNotes.forEach(note => { ctx.fillStyle = `rgba(255, 255, 255, ${note.opacity})`; ctx.font = "20px Arial"; ctx.fillText(note.char, note.x - musicNpc.x, note.y - musicNpc.y); });
        ctx.fillStyle = '#0a0a0a'; ctx.beginPath(); ctx.moveTo(20, 35); ctx.lineTo(-25, 35); ctx.lineTo(-35, 25); ctx.lineTo(-10, 15); ctx.fill();
        ctx.fillStyle = '#111'; ctx.beginPath(); ctx.ellipse(5, 10, 20, 22, Math.PI / 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(0, -15, 13, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffb6c1'; ctx.beginPath(); ctx.arc(-5, -13, 7, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.arc(-5, -13, 7.5, Math.PI * 1.5, Math.PI * 0.5, true); ctx.fill();
        ctx.fillStyle = '#000'; ctx.fillRect(-50, 20, 40, 8); ctx.fillStyle = '#222'; ctx.fillRect(-50, 20, 40, 2);
        let handBounce = Math.abs(Math.sin(frameCount * 0.1) * 2.5);
        ctx.strokeStyle = '#111'; ctx.lineWidth = 11; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(-30, 20 - handBounce); ctx.stroke();
        ctx.fillStyle = '#ffb6c1'; ctx.beginPath(); ctx.arc(-30, 20 - handBounce, 4.5, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        // Frisbee
        frisbee.trail.forEach((p, i) => { ctx.fillStyle = `rgba(200, 255, 0, ${i/12})`; ctx.beginPath(); ctx.arc(p.x, p.y, frisbee.r * (i/12), 0, Math.PI*2); ctx.fill(); });
        ctx.fillStyle = '#dfff00'; ctx.beginPath(); ctx.arc(frisbee.x, frisbee.y, frisbee.r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
        
        // Players
        [ {p: players.bottom, t: 'Bottom'}, {p: players.top, t: 'Top'} ].forEach(obj => {
            ctx.save(); ctx.translate(obj.p.x, obj.p.y);
            ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0, 5, 30, 12, 0, 0, Math.PI*2); ctx.fill();
            let headSize = 22; 
            if (obj.t === 'Bottom') { 
                if (selectedPlayerName === 'Guglielmo') { ctx.fillStyle = '#431'; ctx.beginPath(); ctx.arc(0, 0, headSize, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#ffd393'; ctx.beginPath(); ctx.arc(0, 0, headSize * 0.5, 0, Math.PI*2); ctx.fill(); }
                else { ctx.fillStyle = '#d34'; ctx.beginPath(); ctx.arc(0, 0, headSize, 0, Math.PI*2); ctx.fill(); }
            } else { 
                let isAle = (selectedPlayerName === 'Guglielmo'); ctx.fillStyle = isAle ? '#d34' : '#431'; ctx.beginPath(); ctx.arc(0, 0, headSize + 2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ffd393'; ctx.beginPath(); ctx.arc(0, 4, headSize - 4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(-7, 2, 6, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(7, 2, 6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'black'; let lookX = (frisbee.x - obj.p.x) * 0.03, lookY = (frisbee.y - obj.p.y) * 0.03;
                ctx.beginPath(); ctx.arc(-7 + lookX, 2 + lookY, 2.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(7 + lookX, 2 + lookY, 2.5, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        });

        // Ragnetti
        spiders.forEach(spider => {
            ctx.save(); ctx.translate(spider.x, spider.y);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -spider.y); ctx.stroke();
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
            for (let i = 0; i < 4; i++) {
                let angle = Math.sin(spider.legAnim + i) * 0.5;
                ctx.beginPath(); ctx.moveTo(-2, 0); ctx.lineTo(-10, -5 + (i * 3) + angle); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(10, -5 + (i * 3) - angle); ctx.stroke();
            }
            ctx.restore();
        });

        // UI Barra Funghi
        let mushroomCount = Math.min(poisonedLevel, 10);
        for (let m = 0; m < mushroomCount; m++) {
            let mx = canvas.width - 40 - (m * 35); let my = canvas.height - 40;
            ctx.fillStyle = '#d34'; ctx.beginPath(); ctx.arc(mx, my - 10, 12, Math.PI, 0); ctx.fill();
            ctx.fillStyle = 'white'; ctx.fillRect(mx - 5, my - 18, 3, 3); ctx.fillRect(mx + 3, my - 14, 2, 2);
            ctx.fillStyle = '#eee'; ctx.fillRect(mx - 4, my - 10, 8, 10);
        }

        // --- DISEGNO HALLUCINATION (Nick / Pat) ---
        if (activeHallucination) {
            ctx.save();
            let img = (activeHallucination.type === 'Nick') ? imgNick : imgPat;
            // Calcolo zoom progressivo in 3 secondi (180 frames)
            let progress = (180 - activeHallucination.timer) / 180;
            let scale = 1.0 + (progress * 0.5); // Zoom da 100% a 150%
            let alpha = progress < 0.1 ? progress * 10 : (progress > 0.9 ? (1 - progress) * 10 : 1);
            
            ctx.globalAlpha = alpha;
            let drawW = 400 * scale;
            let drawH = 600 * scale;
            let posX = (activeHallucination.side === 'left') ? -50 : canvas.width - drawW + 50;
            let posY = canvas.height - drawH - 50;
            
            ctx.drawImage(img, posX, posY, drawW, drawH);
            ctx.restore();
        }

        ctx.restore();
        for(let i = 0; i < canvas.height; i += 3) { ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, i, canvas.width, 1); }
    }
    requestAnimationFrame(draw); update();
}
window.addEventListener('resize', setupPositions); setupPositions(); draw();
</script>

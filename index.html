<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIPPY FRISBEE</title>
    <script src="https://unpkg.com/@instantdb/core@latest/dist/index.global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { margin: 0; overflow: hidden; background: #081a05; font-family: 'VT323', monospace; color: white; }
        canvas { display: block; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); z-index: 20; text-align: center; }
        .btn { padding: 15px 40px; background: #d34; color: white; border: 4px solid white; cursor: pointer; font-size: 28px; font-family: 'VT323'; box-shadow: 5px 5px #000; }
        .char-container { display: flex; gap: 20px; margin: 20px; }
        .char-card { border: 4px solid #555; padding: 10px; cursor: pointer; width: 120px; background: #222; }
        .char-card.selected { border-color: #fff; background: #444; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; font-size: 24px; display: none; }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="score">0</span></div>

    <div id="overlay">
        <div id="screen-title">
            <h1 style="font-size: 60px;">TRIPPY FRISBEE</h1>
            <button class="btn" onclick="goToSelect()">INSERT COIN</button>
        </div>

        <div id="screen-select" style="display:none;">
            <h2>SELECT PLAYER</h2>
            <div class="char-container">
                <div class="char-card" id="card-ale" onclick="selectChar('Alessandro')">
                    <img src="ale.jpeg" style="width:100%"><h3>ALE</h3>
                </div>
                <div class="char-card" id="card-gug" onclick="selectChar('Guglielmo')">
                    <img src="gug.jpeg" style="width:100%"><h3>GUG</h3>
                </div>
            </div>
            <button class="btn" id="startBtn" style="opacity:0.5; pointer-events:none;" onclick="startGame()">START</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
// --- DB & AUDIO ---
const db = InstantDB.init({ appId: 'd1f665e7-bc74-4e27-a8a1-203e49387593' });
const sounds = {
    music: new Audio('sountrack.mp3'),
    frisbee: new Audio('fx_frisbee1.mp3'),
    point: new Audio('fx_point.mp3'),
    fail: new Audio('fx_merda1.mp3')
};
sounds.music.loop = true;

function playEffect(key) {
    if (key !== 'frisbee') {
        sounds.music.pause();
        sounds[key].play();
        setTimeout(() => { if(gameState==='PLAY') sounds.music.play(); }, 2000);
    } else {
        sounds.frisbee.currentTime = 0;
        sounds.frisbee.play();
    }
}

// --- GAME LOGIC ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let gameState = 'MENU', myRole = null, score = 0;
let players = {
    top: { x: 200, y: 80, color: '#431' },
    bottom: { x: 200, y: 500, color: '#d34' }
};
let frisbee = { x: 200, y: 300, vy: 0, active: false, owner: 'bottom' };

// Sincronizzazione Real-time
db.subscribe({ players: {} }, (result) => {
    if (result.data?.players) {
        result.data.players.forEach(p => {
            if (p.id === 'state') {
                score = p.score;
                if (myRole !== p.last) { 
                    frisbee.active = p.active; 
                    frisbee.vy = p.vy; 
                }
            } else if (p.id !== myRole) {
                players[p.id].x = p.x;
            }
        });
    }
});

function goToSelect() {
    sounds.music.play().catch(() => console.log("Click per audio"));
    document.getElementById('screen-title').style.display = 'none';
    document.getElementById('screen-select').style.display = 'block';
}

function selectChar(name) {
    myRole = (name === 'Alessandro') ? 'bottom' : 'top';
    document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('card-' + (myRole === 'bottom' ? 'ale' : 'gug')).classList.add('selected');
    document.getElementById('startBtn').style.opacity = 1;
    document.getElementById('startBtn').style.pointerEvents = 'auto';
}

function startGame() {
    gameState = 'PLAY';
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    players.bottom.y = canvas.height - 100;
}

window.addEventListener('keydown', e => {
    if (!myRole || gameState !== 'PLAY') return;
    if (e.code === 'ArrowLeft') players[myRole].x -= 15;
    if (e.code === 'ArrowRight') players[myRole].x += 15;
    if (e.code === 'Space' && !frisbee.active && frisbee.owner === myRole) {
        frisbee.active = true;
        frisbee.vy = (myRole === 'bottom') ? -12 : 12;
        playEffect('frisbee');
    }
});

function loop() {
    if (gameState === 'PLAY') {
        ctx.fillStyle = '#1e3d1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Frisbee
        if (frisbee.active) {
            frisbee.y += frisbee.vy;
            // Collisioni
            let dTop = Math.hypot(frisbee.x - players.top.x, frisbee.y - players.top.y);
            let dBot = Math.hypot(frisbee.x - players.bottom.x, frisbee.y - players.bottom.y);
            
            if (frisbee.vy < 0 && dTop < 40) { 
                score++; frisbee.active = false; frisbee.owner = 'top'; playEffect('point'); 
            }
            if (frisbee.vy > 0 && dBot < 40) { 
                score++; frisbee.active = false; frisbee.owner = 'bottom'; playEffect('point'); 
            }
            if (frisbee.y < 0 || frisbee.y > canvas.height) { 
                frisbee.active = false; playEffect('fail'); 
            }
        } else {
            frisbee.x = players[frisbee.owner].x;
            frisbee.y = (frisbee.owner === 'bottom') ? players.bottom.y - 40 : players.top.y + 40;
        }

        // Disegno Players
        for (let id in players) {
            ctx.fillStyle = players[id].color;
            ctx.beginPath(); ctx.arc(players[id].x, players[id].y, 20, 0, Math.PI*2); ctx.fill();
        }
        // Disegno Frisbee
        ctx.fillStyle = 'yellow';
        ctx.beginPath(); ctx.arc(frisbee.x, frisbee.y, 10, 0, Math.PI*2); ctx.fill();

        document.getElementById('score').innerText = score;

        // Sync al DB
        db.transact([
            db.tx.players[myRole].update({ x: players[myRole].x }),
            db.tx.players['state'].update({ score, active: frisbee.active, vy: frisbee.vy, last: myRole, owner: frisbee.owner })
        ]);
    }
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>

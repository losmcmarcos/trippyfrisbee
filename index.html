<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIPPY FRISBEE - MULTIPLAYER</title>
    <script src="https://unpkg.com/@instantdb/core@latest/dist/index.global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { margin: 0; overflow: hidden; background: #081a05; font-family: 'VT323', monospace; color: white; text-align: center; }
        canvas { display: block; background: #1e3d1a; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); z-index: 20; }
        .btn { padding: 15px 40px; background: #d34; color: white; border: 4px solid white; cursor: pointer; font-size: 28px; font-family: 'VT323'; box-shadow: 5px 5px #000; margin-top: 20px; }
        .char-container { display: flex; gap: 20px; margin: 20px; }
        .char-card { border: 4px solid #555; padding: 10px; cursor: pointer; width: 120px; background: #222; transition: 0.3s; }
        .char-card.selected { border-color: #fff; background: #444; transform: translateY(-5px); }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; font-size: 30px; display: none; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="score">000</span></div>

    <div id="overlay">
        <div id="screen-title">
            <h1 style="font-size: 70px; margin: 0; color: #d34; text-shadow: 4px 4px #fff;">TRIPPY FRISBEE</h1>
            <p style="letter-spacing: 5px;">ONLINE MULTIPLAYER</p>
            <button class="btn" onclick="goToSelect()">INSERT COIN</button>
        </div>

        <div id="screen-select" style="display:none;">
            <h2>CHOOSE YOUR PLAYER</h2>
            <div class="char-container">
                <div class="char-card" id="card-ale" onclick="selectChar('Alessandro')">
                    <div style="width:100%; height:100px; background:#d34; margin-bottom:10px;"></div>
                    <h3>ALE</h3>
                </div>
                <div class="char-card" id="card-gug" onclick="selectChar('Guglielmo')">
                    <div style="width:100%; height:100px; background:#431; margin-bottom:10px;"></div>
                    <h3>GUG</h3>
                </div>
            </div>
            <button class="btn" id="startBtn" style="opacity:0.3; pointer-events:none;" onclick="startGame()">START GAME</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
// --- CONFIGURAZIONE ---
const db = InstantDB.init({ appId: 'd1f665e7-bc74-4e27-a8a1-203e49387593' });
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = 'MENU';
let myRole = null; 
let score = 0;
let players = {
    top: { x: 0, y: 80, color: '#431', targetX: 0 },
    bottom: { x: 0, y: 0, color: '#d34', targetX: 0 }
};
let frisbee = { x: 0, y: 0, vy: 0, active: false, owner: 'bottom' };

// --- AUDIO ---
const sounds = {
    music: new Audio('sountrack.mp3'),
    frisbee: new Audio('fx_frisbee1.mp3'),
    point: new Audio('fx_point.mp3'),
    fail: new Audio('fx_merda1.mp3')
};
sounds.music.loop = true;

function playEffect(key) {
    try {
        if (key === 'music') {
            sounds.music.play().catch(() => {});
        } else if (key === 'frisbee') {
            sounds.frisbee.currentTime = 0; sounds.frisbee.play().catch(() => {});
        } else {
            sounds.music.pause();
            sounds[key].currentTime = 0;
            sounds[key].play().catch(() => {});
            setTimeout(() => { if(gameState === 'PLAY') sounds.music.play().catch(() => {}); }, 2000);
        }
    } catch(e) {}
}

// --- NETWORK ---
db.subscribe({ players: {} }, (result) => {
    if (result.data?.players) {
        result.data.players.forEach(p => {
            if (p.id === 'global_state') {
                score = p.score || 0;
                // Sincronizziamo il frisbee solo se non lo stiamo gestendo noi
                if (myRole !== p.lastMover) {
                    frisbee.active = p.fActive;
                    frisbee.vy = p.fVy;
                    frisbee.owner = p.fOwner;
                }
            } else if (p.id !== myRole && players[p.id]) {
                players[p.id].x = p.x; // Aggiorna posizione dell'altro
            }
        });
    }
});

// --- LOGICA DI GIOCO ---
function goToSelect() {
    playEffect('music');
    document.getElementById('screen-title').style.display = 'none';
    document.getElementById('screen-select').style.display = 'block';
}

function selectChar(name) {
    myRole = (name === 'Alessandro') ? 'bottom' : 'top';
    document.getElementById('card-ale').classList.toggle('selected', name === 'Alessandro');
    document.getElementById('card-gug').classList.toggle('selected', name === 'Guglielmo');
    document.getElementById('startBtn').style.opacity = 1;
    document.getElementById('startBtn').style.pointerEvents = 'auto';
}

function startGame() {
    gameState = 'PLAY';
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    resize();
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    players.top.x = canvas.width / 2;
    players.bottom.x = canvas.width / 2;
    players.bottom.y = canvas.height - 100;
}
window.addEventListener('resize', resize);

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function update() {
    if (gameState !== 'PLAY') return;

    const me = players[myRole];
    if (keys['ArrowLeft'] && me.x > 30) me.x -= 8;
    if (keys['ArrowRight'] && me.x < canvas.width - 30) me.x += 8;

    // Lancio
    if (keys['Space'] && !frisbee.active && frisbee.owner === myRole) {
        frisbee.active = true;
        frisbee.vy = (myRole === 'bottom') ? -14 : 14;
        playEffect('frisbee');
    }

    // Movimento Frisbee
    if (frisbee.active) {
        frisbee.y += frisbee.vy;
        
        // Collisioni locali
        let dTop = Math.hypot(frisbee.x - players.top.x, frisbee.y - players.top.y);
        let dBot = Math.hypot(frisbee.x - players.bottom.x, frisbee.y - players.bottom.y);

        if (frisbee.vy < 0 && dTop < 45) { 
            score++; frisbee.active = false; frisbee.owner = 'top'; playEffect('point'); 
        } else if (frisbee.vy > 0 && dBot < 45) { 
            score++; frisbee.active = false; frisbee.owner = 'bottom'; playEffect('point'); 
        }

        if (frisbee.y < -50 || frisbee.y > canvas.height + 50) {
            frisbee.active = false; playEffect('fail');
        }
    } else {
        frisbee.x = players[frisbee.owner].x;
        frisbee.y = (frisbee.owner === 'bottom') ? players.bottom.y - 40 : players.top.y + 40;
    }

    document.getElementById('score').innerText = score.toString().padStart(3, '0');

    // Invia dati al database
    db.transact([
        db.tx.players[myRole].update({ x: me.x }),
        db.tx.players['global_state'].update({ 
            score, 
            fActive: frisbee.active, 
            fVy: frisbee.vy, 
            fOwner: frisbee.owner,
            lastMover: myRole 
        })
    ]);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (gameState === 'PLAY') {
        // Disegno Player Top
        ctx.fillStyle = players.top.color;
        ctx.beginPath(); ctx.arc(players.top.x, players.top.y, 25, 0, Math.PI*2); ctx.fill();
        
        // Disegno Player Bottom
        ctx.fillStyle = players.bottom.color;
        ctx.beginPath(); ctx.arc(players.bottom.x, players.bottom.y, 25, 0, Math.PI*2); ctx.fill();

        // Disegno Frisbee
        ctx.fillStyle = '#dfff00';
        ctx.beginPath(); ctx.arc(frisbee.x, frisbee.y, 10, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.stroke();
    }
    update();
    requestAnimationFrame(draw);
}
resize();
draw();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>TRIPPY FRISBEE ONLINE</title>
<style>
body { margin:0; overflow:hidden; background:#081a05; color:white; font-family:monospace;}
canvas { display:block; }
#info { position:absolute; top:10px; left:10px; }
</style>
</head>
<body>

<div id="info">Connecting...</div>
<canvas id="game"></canvas>

<script type="module">
import { init, tx } from "https://esm.sh/@instantdb/browser";

const db = init({
  appId: "d1f665e7-bc74-4e27-a8a1-203e49387593"
});

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let roomId = "trippy-room";
let playerId = Math.random().toString(36).slice(2);
let isHost = false;

let state = {
  players: {
    top: {x:300,y:100},
    bottom: {x:300,y:500}
  },
  frisbee: {x:300,y:300,vy:0,active:false,owner:"bottom"},
  score: 0
};

let keys = {};

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

window.addEventListener("keydown", e=>keys[e.code]=true);
window.addEventListener("keyup", e=>keys[e.code]=false);

async function joinRoom(){
  const res = await db.query({
    rooms: {$:{where:{id:roomId}}}
  });

  if(res.rooms.length === 0){
    isHost = true;

    await db.transact([
      tx.rooms[roomId].update(state)
    ]);

    document.getElementById("info").innerText = "HOST";
  } else {
    document.getElementById("info").innerText = "CLIENT";
  }

  listenRoom();
}

function listenRoom(){
  db.subscribeQuery(
    { rooms: {$:{where:{id:roomId}}} },
    data=>{
      const room = data.rooms[0];
      if(!room) return;

      state = room;
    }
  );
}

function sendState(){
  db.transact([
    tx.rooms[roomId].update(state)
  ]);
}

function update(){

  // MOVIMENTO LOCALE
  if(keys["ArrowLeft"]) state.players.bottom.x -= 5;
  if(keys["ArrowRight"]) state.players.bottom.x += 5;

  if(keys["KeyA"]) state.players.top.x -= 5;
  if(keys["KeyD"]) state.players.top.x += 5;

  // SOLO HOST CALCOLA FISICA
  if(isHost){

    let f = state.frisbee;

    if(!f.active){
      f.x = state.players[f.owner].x;
      f.y = f.owner === "bottom" ? state.players.bottom.y-30 : state.players.top.y+30;
    }

    if(keys["Space"] && f.owner==="bottom"){
      f.active = true;
      f.vy = -10;
    }

    if(keys["Enter"] && f.owner==="top"){
      f.active = true;
      f.vy = 10;
    }

    if(f.active){
      f.y += f.vy;

      // catch top
      if(f.vy < 0 && Math.abs(f.y - state.players.top.y) < 30){
        f.owner = "top";
        f.active = false;
        state.score++;
      }

      // catch bottom
      if(f.vy > 0 && Math.abs(f.y - state.players.bottom.y) < 30){
        f.owner = "bottom";
        f.active = false;
        state.score++;
      }
    }

    sendState();
  }
}

function draw(){
  ctx.fillStyle="#1e3d1a";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // players
  ctx.fillStyle="white";
  ctx.fillRect(state.players.top.x-20,state.players.top.y-10,40,20);
  ctx.fillRect(state.players.bottom.x-20,state.players.bottom.y-10,40,20);

  // frisbee
  ctx.fillStyle="yellow";
  ctx.beginPath();
  ctx.arc(state.frisbee.x,state.frisbee.y,10,0,Math.PI*2);
  ctx.fill();

  // score
  ctx.fillText("Score: "+state.score,20,40);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

joinRoom();
loop();

</script>
</body>
</html>

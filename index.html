<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIPPY FRISBEE - FIXED</title>
    <script src="https://unpkg.com/@instantdb/core@latest/dist/index.global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { margin: 0; overflow: hidden; background: #081a05; font-family: 'VT323', monospace; color: white; }
        canvas { display: block; image-rendering: pixelated; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); z-index: 20; text-align: center; }
        #overlay h1 { font-size: 85px; color: #d34; text-shadow: 4px 4px #000; margin: 0; line-height: 0.8; }
        
        .mushroom { width: 80px; height: 60px; margin-bottom: 25px; position: relative; display: inline-block; animation: bounce 2s infinite ease-in-out; }
        .m-top { width: 80px; height: 40px; background: #d34; border-radius: 40px 40px 8px 8px; position: relative; box-shadow: inset -8px -4px rgba(0,0,0,0.2); }
        .m-dot { position: absolute; background: white; width: 12px; height: 12px; border-radius: 50%; }
        .m-stem { width: 30px; height: 25px; background: #eee; margin: -4px auto 0; border-radius: 0 0 8px 8px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .btn { padding: 15px 45px; background: #d34; color: white; border: 4px solid white; cursor: pointer; font-size: 30px; font-family: 'VT323'; box-shadow: 5px 5px #000; margin-top: 30px; }
        .char-container { display: flex; gap: 20px; margin: 25px; }
        .char-card { border: 4px solid #555; padding: 10px; cursor: pointer; width: 140px; background: #111; }
        .char-card img { width: 100%; height: 150px; object-fit: cover; background: #222; }
        .char-card.selected { border-color: #fff; background: #333; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; font-size: 30px; display: none; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="ui">
        <div id="scoreText">SCORE: 000</div>
        <div id="poison-txt" style="color: lime; font-size: 22px;">STATUS: SOBER</div>
    </div>

    <div id="overlay">
        <div id="screen-title">
            <div class="mushroom">
                <div class="m-top">
                    <div class="m-dot" style="top:8px; left:15px;"></div>
                    <div class="m-dot" style="top:20px; left:45px;"></div>
                    <div class="m-dot" style="top:12px; left:60px; width:8px; height:8px;"></div>
                </div>
                <div class="m-stem"></div>
            </div>
            <h1>TRIPPY FRISBEE</h1>
            <button class="btn" id="btn-insert">INSERT COIN</button>
        </div>

        <div id="screen-select" style="display:none;">
            <h2 style="font-size: 40px;">SELECT YOUR PLAYER</h2>
            <div class="char-container">
                <div class="char-card" id="card-ale" onclick="selectChar('Alessandro')">
                    <img src="ale.jpeg"><h3>ALE</h3>
                </div>
                <div class="char-card" id="card-gug" onclick="selectChar('Guglielmo')">
                    <img src="gug.jpeg"><h3>GUG</h3>
                </div>
            </div>
            <button class="btn" id="startBtn" style="opacity:0.3; pointer-events:none;" onclick="startGame()">START GAME</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
// --- DB ---
const db = InstantDB.init({ appId: 'd1f665e7-bc74-4e27-a8a1-203e49387593' });

// --- AUDIO SYSTEM (ULTRA SAFE) ---
let sounds = {};
function initAudio() {
    const files = { music:'sountrack.mp3', frisbee:'fx_frisbee1.mp3', point:'fx_point.mp3', fail:'fx_merda1.mp3', schianto:'fx_schianto.mp3' };
    Object.keys(files).forEach(k => { 
        sounds[k] = new Audio(files[k]); 
        if(k==='music') sounds[k].loop = true;
    });
}

function playVoice(key) {
    if(!sounds[key]) return;
    try {
        if(sounds.music) sounds.music.pause();
        sounds[key].currentTime = 0;
        sounds[key].play().catch(e=>{});
        setTimeout(() => { if(gameState==='PLAY' && sounds.music) sounds.music.play().catch(e=>{}); }, 1800);
    } catch(e){}
}

// --- LOGICA ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let gameState = 'MENU', myRole = null, score = 0;
const players = { top:{x:0, y:80, skin:'#ffd393', hair:'#431'}, bottom:{x:0, y:0, skin:'#ffd393', beard:'#d34'} };
const frisbee = { x:0, y:0, r:10, vy:0, active:false, owner:'bottom' };
const tree = { x:0, y:0, drift:0, offsetX:0 };

// Sincronizzazione
db.subscribe({ trippy_game: {} }, (res) => {
    if (res.data?.trippy_game) {
        res.data.trippy_game.forEach(o => {
            if (o.id === 'state') {
                score = o.score || 0;
                if (myRole !== o.lastL) { frisbee.active=o.fA; frisbee.vy=o.fV; frisbee.owner=o.fO; }
            } else if (o.id !== myRole && players[o.id]) { players[o.id].x = o.x; }
        });
    }
});

// IL BOTTONE SBLOCCA L'AUDIO
document.getElementById('btn-insert').addEventListener('click', () => {
    initAudio(); // Carica i file solo dopo il click
    setTimeout(() => { if(sounds.music) sounds.music.play().catch(e=>{}); }, 100);
    document.getElementById('screen-title').style.display = 'none';
    document.getElementById('screen-select').style.display = 'block';
});

function selectChar(n) {
    myRole = (n === 'Alessandro') ? 'bottom' : 'top';
    document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('card-' + (myRole === 'bottom' ? 'ale' : 'gug')).classList.add('selected');
    document.getElementById('startBtn').style.opacity = 1;
    document.getElementById('startBtn').style.pointerEvents = 'auto';
}

function startGame() {
    gameState = 'PLAY';
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    resize();
}

function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    players.bottom.y = canvas.height - 110; tree.x = canvas.width/2; tree.y = canvas.height/2;
}

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function update() {
    if (gameState !== 'PLAY') return;
    if (score >= 3) {
        tree.drift += 0.02 + (Math.floor(score/3)*0.01);
        tree.offsetX = Math.sin(tree.drift) * (100 + (score*5));
        const t = document.getElementById('poison-txt');
        t.innerText = "STATUS: TRIPPING"; t.className = "blink"; t.style.color = "#f0f";
    }
    if (keys['ArrowLeft'] && players[myRole].x > 40) players[myRole].x -= 8;
    if (keys['ArrowRight'] && players[myRole].x < canvas.width-40) players[myRole].x += 8;
    if (keys['Space'] && !frisbee.active && frisbee.owner === myRole) {
        frisbee.active = true; frisbee.vy = (myRole==='bottom') ? -14 : 14;
        if(sounds.frisbee) { sounds.frisbee.currentTime = 0; sounds.frisbee.play().catch(e=>{}); }
    }
    if (frisbee.active) {
        frisbee.y += frisbee.vy;
        let rx = frisbee.x - (tree.x + tree.offsetX);
        if (frisbee.y < tree.y + 20 && frisbee.y > tree.y - 120 && Math.abs(rx) > 60 && Math.abs(rx) < 120) {
            playVoice('schianto'); setTimeout(()=>playVoice('fail'),400); frisbee.active = false;
        }
        let dT = Math.hypot(frisbee.x - players.top.x, frisbee.y - players.top.y);
        let dB = Math.hypot(frisbee.x - players.bottom.x, frisbee.y - players.bottom.y);
        if (frisbee.vy < 0 && dT < 45) { score++; frisbee.owner='top'; frisbee.active=false; playVoice('point'); }
        else if (frisbee.vy > 0 && dB < 45) { score++; frisbee.owner='bottom'; frisbee.active=false; playVoice('point'); }
        if (frisbee.y < -50 || frisbee.y > canvas.height+50) { frisbee.active=false; playVoice('fail'); }
    } else {
        frisbee.x = players[frisbee.owner].x; frisbee.y = (frisbee.owner==='bottom') ? players.bottom.y-45 : players.top.y+45;
    }
    document.getElementById('scoreText').innerText = "SCORE: " + score.toString().padStart(3, '0');
    db.transact([
        db.tx.trippy_game[myRole].update({ x: players[myRole].x }),
        db.tx.trippy_game['state'].update({ score, fA:frisbee.active, fV:frisbee.vy, fO:frisbee.owner, lastL:myRole })
    ]);
}

function draw() {
    ctx.fillStyle = '#1e3d1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (gameState === 'PLAY') {
        ctx.save(); ctx.translate(tree.x + tree.offsetX, tree.y);
        ctx.fillStyle = '#3d2514'; ctx.fillRect(-32, -5, 65, 85);
        ctx.fillStyle = '#5d3b22';
        [-1, 1].forEach(s => { ctx.beginPath(); ctx.moveTo(s*20,10); ctx.lineTo(s*110,-120); ctx.lineTo(s*70,-120); ctx.lineTo(0,30); ctx.fill(); });
        ctx.restore();
        // Ale
        ctx.save(); ctx.translate(players.bottom.x, players.bottom.y);
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0,0,26,16,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = players.bottom.beard; ctx.beginPath(); ctx.arc(0,-6,13,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = players.bottom.skin; ctx.beginPath(); ctx.arc(0,-6,9,0,Math.PI*2); ctx.fill();
        ctx.restore();
        // Gug
        ctx.save(); ctx.translate(players.top.x, players.top.y);
        ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.ellipse(0,0,26,16,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = players.top.hair; ctx.beginPath(); ctx.arc(0,6,13,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = players.top.skin; ctx.beginPath(); ctx.arc(0,6,7,0,Math.PI*2); ctx.fill();
        ctx.restore();
        // Frisbee
        ctx.fillStyle = '#dfff00'; ctx.beginPath(); ctx.arc(frisbee.x, frisbee.y, 10, 0, Math.PI*2); ctx.fill();
    }
    update(); requestAnimationFrame(draw);
}
window.addEventListener('resize', resize); resize(); draw();
</script>
</body>
</html>

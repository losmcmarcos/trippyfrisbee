<!DOCTYPE html>
<html>
<head>
    <title>TEST SYNC</title>
    <script src="https://unpkg.com/@instantdb/core@latest/dist/index.global.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; }
        #box { width: 50px; height: 50px; background: red; position: absolute; }
    </style>
</head>
<body>
    <h1>MUOVI IL QUADRATO CON LE FRECCE</h1>
    <p id="status">Connessione...</p>
    <div id="box"></div>

    <script>
        const db = InstantDB.init({ appId: 'd1f665e7-bc74-4e27-a8a1-203e49387593' });
        const box = document.getElementById('box');
        let x = 100;
        let myId = Math.random().toString(36).substring(7); // ID casuale per questa scheda

        // Leggi dal DB
        db.subscribe({ test_pos: {} }, (result) => {
            if (result.data?.test_pos) {
                document.getElementById('status').innerText = "CONNESSO! Muovi le frecce.";
                result.data.test_pos.forEach(p => {
                    if (p.id !== myId) {
                        // Crea o muovi il quadrato dell'altro giocatore
                        let farBox = document.getElementById(p.id);
                        if (!farBox) {
                            farBox = document.createElement('div');
                            farBox.id = p.id;
                            farBox.style.width = '50px';
                            farBox.style.height = '50px';
                            farBox.style.background = 'blue';
                            farBox.style.position = 'absolute';
                            document.body.appendChild(farBox);
                        }
                        farBox.style.left = p.x + 'px';
                        farBox.style.top = '200px';
                    }
                });
            }
        });

        // Muovi e scrivi nel DB
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') x -= 10;
            if (e.key === 'ArrowRight') x += 10;
            box.style.left = x + 'px';
            box.style.top = '200px';
            db.transact([db.tx.test_pos[myId].update({ x: x })]);
        });
    </script>
</body>
</html>
